<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Hiện Đại - Magic Edition</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(-45deg, #e0e7ff, #fbcfe8, #bae6fd, #f3e8ff);
            min-height: 100vh;
            overflow-x: hidden;
            color: #1e293b;
        }

        /* Ambient floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: float 10s ease-in-out infinite;
        }
        .orb-1 { width: 300px; height: 300px; background: rgba(167, 139, 250, 0.6); top: -50px; left: -50px; }
        .orb-2 { width: 400px; height: 400px; background: rgba(244, 114, 182, 0.5); bottom: -100px; right: -100px; animation-delay: -5s; }
        .orb-3 { width: 250px; height: 250px; background: rgba(56, 189, 248, 0.5); top: 40%; left: 60%; animation: float-reverse 12s ease-in-out infinite; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.1); }
        }
        @keyframes float-reverse {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(30px) scale(0.9); }
        }
        
        /* Ẩn con trỏ chuột trong ô nhập liệu (khôi phục native vertical align) */
        .sudoku-cell {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            caret-color: transparent;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            user-select: none;
            -webkit-user-select: none;
        }

        .sudoku-cell input {
            width: 100%;
            height: 100%;
            background: transparent !important;
            border: none !important;
            outline: none !important;
            text-align: center;
            font-family: inherit;
            font-size: inherit;
            font-weight: inherit;
            color: inherit;
            padding: 0;
            margin: 0;
            caret-color: transparent;
            cursor: pointer;
            box-shadow: none !important;
            display: block;
        }
        
        /* Trạng thái tạm dừng - Ẩn hoàn toàn số */
        .game-paused .sudoku-cell {
            color: transparent !important;
            text-shadow: none !important;
        }

        /* Hiệu ứng khi được chọn/focus */
        .sudoku-cell:focus-within {
            z-index: 20;
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.4); /* Pink glow */
            border-radius: 6px;
            outline: none;
            background-color: rgba(255, 255, 255, 0.95) !important;
        }
        
        /* Cảnh báo trùng lặp */
        @keyframes blink-bg-red {
            0%, 100% { background-color: rgba(254, 226, 226, 0.9); }
            50% { background-color: rgba(254, 202, 202, 0.9); }
        }
        .duplicate {
            color: #ef4444 !important;
            border-color: #ef4444 !important;
            animation: blink-bg-red 1.2s infinite !important;
            z-index: 15;
        }
        
        /* Các ô cùng hàng, cột hoặc khối */
        .highlight-group {
            background-color: rgba(224, 231, 255, 0.6) !important;
        }
        
        /* Ô đang được chọn (không focus) */
        .highlight-cell {
            background-color: rgba(199, 210, 254, 0.8) !important;
            z-index: 5;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.3);
        }
        
        /* Các ô cố định từ đầu */
        .fixed-cell {
            background-color: rgba(255, 255, 255, 0.6);
            color: #312e81; /* Indigo 900 */
            font-weight: 800;
            text-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        
        /* Ẩn mũi tên lên xuống mặc định của thẻ input type number/text */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        /* Hiệu ứng pop in khi tạo lưới mới */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5) rotate(-10deg); }
            70% { transform: scale(1.1) rotate(5deg); }
            100% { opacity: 1; transform: scale(1) rotate(0); }
        }
        .animate-pop {
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        
        /* Fancy animated gradient text */
        .text-gradient-animated {
            background: linear-gradient(to right, #4f46e5, #ec4899, #8b5cf6, #4f46e5);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 3s linear infinite;
        }
        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Glass Panel Styling */
        .glass-panel {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15), inset 0 0 0 1px rgba(255, 255, 255, 0.3);
            transform: translateZ(0); /* Kích hoạt hardware acceleration */
        }
        
        .glass-button {
            background: rgba(255, 255, 255, 0.85); /* Tăng độ đục để bù cho việc bỏ mờ */
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            /* Bỏ backdrop-filter ở nút bấm nhỏ để giảm lag trên mobile */
        }
        .glass-button:hover {
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.2);
            transform: translateY(-2px);
        }
        
        /* Pencil Notes Styling */
        .pencil-grid {
            position: absolute;
            inset: 0;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            justify-content: flex-start;
            pointer-events: none;
            padding: 4px 5px;
            z-index: 10;
            font-size: 0.75rem; /* ~12px */
            line-height: 1.2;
            color: #94a3b8; /* slate-400 (nhạt hơn) */
            font-weight: 500; /* nét mỏng hơn */
            letter-spacing: 2px;
            word-break: break-all;
        }
        
        /* Chế độ bút chì bật */
        .btn-pencil-active {
            background: linear-gradient(to right, #fbbf24, #f59e0b) !important;
            color: white !important;
            border: 2px solid #c2410c !important; /* Viền sậm màu bên ngoài ô */
            box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.4), 0 10px 20px rgba(245, 158, 11, 0.4) !important;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-2 sm:p-4 relative">

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

            <select id="size-select" class="px-2 py-1.5 text-sm sm:text-base bg-white/70 rounded-xl border border-white/50 shadow-sm focus:ring-2 focus:ring-pink-400 outline-none font-semibold text-indigo-800 cursor-pointer transition hover:bg-white">
                <option value="3">Lưới 3x3</option>

        <div id="win-content" class="glass-panel p-6 rounded-[2.5rem] text-center max-w-sm w-full mx-4 transform scale-90 transition-transform duration-500 shadow-[0_20px_50px_rgba(0,0,0,0.2)]">
            <div class="text-6xl mb-3 animate-bounce">🎉</div>

            <div class="bg-white/50 rounded-2xl p-4 mb-6 text-left space-y-2.5 text-indigo-900 border border-white/60 shadow-inner">

            <div class="flex justify-between items-center mb-3">

            <!-- Bộ lọc kích thước -->

                <button class="tab-btn px-2 py-0.5 bg-white/50 text-indigo-900 hover:bg-white rounded-lg text-[11px] font-semibold whitespace-nowrap" data-size="6">6x6</button>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let gridSize = 9;
            let currentPuzzle = [];
            let selectedCell = null;
            let timerInterval;
            let accumulatedTime = 0; // ms
            let timerStartTime;
            let isPaused = true;
            let gameStarted = false;
            let isPencilMode = false;

            const gridContainer = document.getElementById('grid-container');
            const numpad = document.getElementById('numpad');
            const btnPencil = document.getElementById('btn-pencil');

            // Xử lý sự kiện bật/tắt Pencil Mode
            btnPencil.addEventListener('click', () => {
                isPencilMode = !isPencilMode;
                if (isPencilMode) {
                    btnPencil.classList.add('btn-pencil-active');
                    btnPencil.classList.remove('text-amber-600', 'bg-white/60', 'border-amber-300');
                } else {
                    btnPencil.classList.remove('btn-pencil-active');
                    btnPencil.classList.add('text-amber-600', 'bg-white/60', 'border-amber-300');
                }
            });

            function getBlockSize(size) {
                if (size === 6) return { r: 2, c: 3 };
                if (size === 8) return { r: 4, c: 2 };
                if (size === 9) return { r: 3, c: 3 };
                return { r: size, c: size }; 
            }

            function generateSudoku(size) {
                let board = Array(size).fill().map(() => Array(size).fill(0));
                let blocks = getBlockSize(size);
                
                function isValid(board, row, col, num) {
                    for (let i = 0; i < size; i++) {
                        if (board[row][i] === num) return false;
                        if (board[i][col] === num) return false;
                    }
                    if (blocks.r * blocks.c === size) {
                        let startRow = Math.floor(row / blocks.r) * blocks.r;
                        let startCol = Math.floor(col / blocks.c) * blocks.c;
                        for (let i = 0; i < blocks.r; i++) {
                            for (let j = 0; j < blocks.c; j++) {
                                if (board[startRow + i][startCol + j] === num) return false;
                            }
                        }
                    }
                    return true;
                }

                function solve(board, r = 0, c = 0) {
                    if (r === size) return true;
                    if (c === size) return solve(board, r + 1, 0);
                    if (board[r][c] !== 0) return solve(board, r, c + 1);
                    
                    let nums = Array.from({length: size}, (_, i) => i + 1);
                    for (let i = nums.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [nums[i], nums[j]] = [nums[j], nums[i]];
                    }
                    
                    for (let num of nums) {
                        if (isValid(board, r, c, num)) {
                            board[r][c] = num;
                            if (solve(board, r, c + 1)) return true;
                            board[r][c] = 0;
                        }
                    }
                    return false;
                }
                
                solve(board);
                return board;
            }

            function createPuzzle(solution, difficulty) {
                let size = solution.length;
                let puzzle = solution.map(row => [...row]);
                let cellsToRemove = 0;
                
                if (difficulty === 'easy') cellsToRemove = Math.floor(size * size * 0.35);
                else if (difficulty === 'medium') cellsToRemove = Math.floor(size * size * 0.6);
                else if (difficulty === 'hard') cellsToRemove = Math.floor(size * size * 0.75);
                else if (difficulty === 'very_hard') cellsToRemove = Math.floor(size * size * 0.85);
                
                let removed = 0;
                while (removed < cellsToRemove) {
                    let r = Math.floor(Math.random() * size);
                    let c = Math.floor(Math.random() * size);
                    if (puzzle[r][c] !== 0) {
                        puzzle[r][c] = 0;
                        removed++;
                    }
                }
                return puzzle;
            }

            function renderGrid() {
                gridContainer.innerHTML = '';
                gridContainer.style.gridTemplateColumns = `repeat(${gridSize}, minmax(0, 1fr))`;
                gridContainer.style.gridTemplateRows = `repeat(${gridSize}, minmax(0, 1fr))`;
                
                let blocks = getBlockSize(gridSize);

                for (let r = 0; r < gridSize; r++) {
                    for (let c = 0; c < gridSize; c++) {
                        let val = currentPuzzle[r][c];
                        
                        // Tạo phần tử bọc (wrapper div) đại diện cho ô sudoku
                        let cellWrapper = document.createElement('div');
                        cellWrapper.dataset.row = r;
                        cellWrapper.dataset.col = c;
                        
                        let classes = [
                            'sudoku-cell', 'w-full', 'h-full', 'text-center', 
                            gridSize >= 8 ? 'text-base sm:text-xl' : 'text-xl sm:text-2xl', 
                            'font-bold', 'm-0', 'p-0', 'cursor-pointer', 'bg-white/40'
                        ];
                        
                        if (blocks.r * blocks.c === gridSize) {
                            if ((r + 1) % blocks.r === 0 && r !== gridSize - 1) {
                                classes.push('border-b-[3px]', 'border-b-indigo-400/50');
                            } else if (r !== gridSize - 1) {
                                classes.push('border-b', 'border-b-indigo-200/50');
                            }
                            
                            if ((c + 1) % blocks.c === 0 && c !== gridSize - 1) {
                                classes.push('border-r-[3px]', 'border-r-indigo-400/50');
                            } else if (c !== gridSize - 1) {
                                classes.push('border-r', 'border-r-indigo-200/50');
                            }
                        } else {
                            if (r !== gridSize - 1) classes.push('border-b', 'border-b-indigo-200/50');
                            if (c !== gridSize - 1) classes.push('border-r', 'border-r-indigo-200/50');
                        }
                        
                        // Tạo phần tử input thực tế bên trong
                        let input = document.createElement('input');
                        input.type = 'text';
                        input.inputMode = 'none';
                        
                        if (val !== 0) {
                            classes.push('fixed-cell');
                            input.value = val;
                            input.readOnly = true;
                        } else {
                            classes.push('text-blue-600', 'font-black', 'drop-shadow-sm', 'hover:bg-white/80');
                            input.value = '';
                        }
                        
                        cellWrapper.style.animationDelay = `${(r * gridSize + c) * 4}ms`;
                        classes.push('animate-pop');

                        cellWrapper.className = classes.join(' ');
                        cellWrapper.appendChild(input);
                        
                        cellWrapper.notes = new Set();
                        let pencilGrid = document.createElement('div');
                        pencilGrid.className = 'pencil-grid';
                        cellWrapper.appendChild(pencilGrid);
                        cellWrapper.pencilGrid = pencilGrid;
                        
                        // Định nghĩa getter/setter/focus trên wrapper để tương thích ngược hoàn hảo
                        Object.defineProperty(cellWrapper, 'value', {
                            get() { return input.value; },
                            set(val) { input.value = val; },
                            configurable: true
                        });
                        Object.defineProperty(cellWrapper, 'readOnly', {
                            get() { return input.readOnly; },
                            set(val) { input.readOnly = val; },
                            configurable: true
                        });
                        cellWrapper.focus = function(options) {
                            input.focus(options);
                        };
                        
                        input.addEventListener('focus', () => {
                            if (isPaused) {
                                input.blur();
                                return;
                            }
                            selectedCell = input;
                            highlightCells(r, c);
                        });
                        
                        input.addEventListener('keydown', (e) => {
                            if (isPaused) {
                                e.preventDefault();
                                return;
                            }
                            let cellR = r;
                            let cellC = c;
                            
                            if (e.key === 'ArrowUp') {
                                e.preventDefault();
                                focusCell(cellR - 1, cellC);
                            } else if (e.key === 'ArrowDown') {
                                e.preventDefault();
                                focusCell(cellR + 1, cellC);
                            } else if (e.key === 'ArrowLeft') {
                                e.preventDefault();
                                focusCell(cellR, cellC - 1);
                            } else if (e.key === 'ArrowRight') {
                                e.preventDefault();
                                focusCell(cellR, cellC + 1);
                            } else if (e.key === 'Backspace' || e.key === 'Delete') {
                                e.preventDefault();
                                if (!input.readOnly) {
                                    input.value = '';
                                    cellWrapper.notes.clear();
                                    updatePencilGrid(cellWrapper);
                                    checkDuplicates();
                                }
                            } else if (/^[1-9]$/.test(e.key)) {
                                e.preventDefault();
                                if (!input.readOnly) {
                                    let num = parseInt(e.key);
                                    if (num <= gridSize) {
                                        if (isPencilMode) {
                                            if (input.value === '') {
                                                if (cellWrapper.notes.has(num)) {
                                                    cellWrapper.notes.delete(num);
                                                } else {
                                                    cellWrapper.notes.add(num);
                                                }
                                                updatePencilGrid(cellWrapper);
                                            }
                                        } else {
                                            input.value = num;
                                            cellWrapper.notes.clear();
                                            updatePencilGrid(cellWrapper);
                                            checkDuplicates();
                                        }
                                    }
                                }
                            }
                        });
                        
                        input.addEventListener('input', (e) => {
                            if (isPaused) {
                                e.target.value = '';
                                return;
                            }
                            let val = e.target.value;
                            if (val.length > 1) val = val.slice(-1);
                            
                            if (val !== "") {
                                if (!/^[1-9]$/.test(val) || parseInt(val) > gridSize) {
                                    e.target.value = '';
                                } else {
                                    e.target.value = val;
                                    cellWrapper.notes.clear();
                                    updatePencilGrid(cellWrapper);
                                }
                            } else {
                                cellWrapper.notes.clear();
                                updatePencilGrid(cellWrapper);
                            }
                            checkDuplicates();
                        });
                        
                        gridContainer.appendChild(cellWrapper);
                    }
                }
            }

            function updatePencilGrid(cellWrapper) {
                if (!cellWrapper || !cellWrapper.pencilGrid) return;
                if (cellWrapper.notes.size > 0) {
                    let sortedNotes = Array.from(cellWrapper.notes).sort((a, b) => a - b);
                    cellWrapper.pencilGrid.innerText = sortedNotes.join('');
                } else {
                    cellWrapper.pencilGrid.innerText = '';
                }
            }

            function renderNumpad() {
                numpad.innerHTML = '';
                for (let i = 1; i <= gridSize; i++) {
                    let btn = document.createElement('button');
                    btn.className = 'glass-button py-2 sm:py-3 font-black text-lg sm:text-xl rounded-xl transition-all';
                    btn.style.color = '#0d9488';
                    btn.innerText = i;
                    btn.onclick = () => fillNumber(i);
                    numpad.appendChild(btn);
                }

                let clearBtn = document.createElement('button');
                clearBtn.className = 'glass-button py-2 sm:py-3 text-rose-500 font-bold text-sm sm:text-base rounded-xl transition-all';
                clearBtn.innerHTML = '⌫';
                clearBtn.onclick = () => fillNumber('');
                numpad.appendChild(clearBtn);
            }

            function fillNumber(num) {
                if (isPaused) return;
                if (selectedCell && !selectedCell.readOnly) {
                    let cellWrapper = selectedCell.closest('.sudoku-cell');
                    if (num === '') {
                        selectedCell.value = '';
                        if (cellWrapper && cellWrapper.notes) {
                            cellWrapper.notes.clear();
                            updatePencilGrid(cellWrapper);
                        }
                    } else if (isPencilMode) {
                        if (selectedCell.value === '') {
                            if (cellWrapper && cellWrapper.notes) {
                                if (cellWrapper.notes.has(num)) {
                                    cellWrapper.notes.delete(num);
                                } else {
                                    cellWrapper.notes.add(num);
                                }
                                updatePencilGrid(cellWrapper);
                            }
                        }
                    } else {
                        selectedCell.value = num;
                        if (cellWrapper && cellWrapper.notes) {
                            cellWrapper.notes.clear();
                            updatePencilGrid(cellWrapper);
                        }
                    }
                    selectedCell.focus({ preventScroll: true }); 
                    
                    checkDuplicates();
                }
            }

            function focusCell(r, c) {
                if (r >= 0 && r < gridSize && c >= 0 && c < gridSize) {
                    let target = document.querySelector(`.sudoku-cell[data-row="${r}"][data-col="${c}"]`);
                    if (target) target.focus({ preventScroll: true });
                }
            }

            function highlightCells(r, c) {
                let blocks = getBlockSize(gridSize);
                let startRow = Math.floor(r / blocks.r) * blocks.r;
                let startCol = Math.floor(c / blocks.c) * blocks.c;

                document.querySelectorAll('.sudoku-cell').forEach(el => {
                    el.classList.remove('highlight-group', 'highlight-cell');
                    let cellR = parseInt(el.dataset.row);
                    let cellC = parseInt(el.dataset.col);
                    
                    if (cellR === r && cellC === c) {
                        el.classList.add('highlight-cell');
                    } else if (cellR === r || cellC === c) {
                        el.classList.add('highlight-group');
                    } else if (blocks.r * blocks.c === gridSize && 
                               cellR >= startRow && cellR < startRow + blocks.r &&
                               cellC >= startCol && cellC < startCol + blocks.c) {
                        el.classList.add('highlight-group');
                    }
                });
            }

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.sudoku-cell') && !e.target.closest('#numpad')) {
                    document.querySelectorAll('.sudoku-cell').forEach(el => {
                        el.classList.remove('highlight-group', 'highlight-cell');
                    });
                    selectedCell = null;
                }
            });

            function checkDuplicates() {
                let blocks = getBlockSize(gridSize);
                let cells = document.querySelectorAll('.sudoku-cell');
                
                cells.forEach(c => c.classList.remove('duplicate'));
                
                let boardArr = Array(gridSize).fill().map(() => Array(gridSize).fill(0));
                cells.forEach(c => {
                    let r = parseInt(c.dataset.row);
                    let col = parseInt(c.dataset.col);
                    boardArr[r][col] = parseInt(c.value) || 0;
                });

                let duplicates = new Set();

                for (let r = 0; r < gridSize; r++) {
                    for (let c = 0; c < gridSize; c++) {
                        let num = boardArr[r][c];
                        if (num === 0) continue;
                        
                        for (let i = 0; i < gridSize; i++) {
                            if (i !== c && boardArr[r][i] === num) {
                                duplicates.add(`${r}-${c}`);
                                duplicates.add(`${r}-${i}`);
                            }
                        }
                        for (let i = 0; i < gridSize; i++) {
                            if (i !== r && boardArr[i][c] === num) {
                                duplicates.add(`${r}-${c}`);
                                duplicates.add(`${i}-${c}`);
                            }
                        }
                        if (blocks.r * blocks.c === gridSize) {
                            let startRow = Math.floor(r / blocks.r) * blocks.r;
                            let startCol = Math.floor(c / blocks.c) * blocks.c;
                            for (let i = 0; i < blocks.r; i++) {
                                for (let j = 0; j < blocks.c; j++) {
                                    let currR = startRow + i;
                                    let currC = startCol + j;
                                    if ((currR !== r || currC !== c) && boardArr[currR][currC] === num) {
                                        duplicates.add(`${r}-${c}`);
                                        duplicates.add(`${currR}-${currC}`);
                                    }
                                }
                            }
                        }
                    }
                }
                
                duplicates.forEach(id => {
                    let [r, c] = id.split('-');
                    let el = document.querySelector(`.sudoku-cell[data-row="${r}"][data-col="${c}"]`);
                    if (el) el.classList.add('duplicate');
                });

                checkWin(boardArr, duplicates.size);
            }

            function checkWin(boardArr, duplicateCount) {
                if (duplicateCount > 0) return;
                
                for (let r = 0; r < gridSize; r++) {
                    for (let c = 0; c < gridSize; c++) {
                        if (boardArr[r][c] === 0) return;
                    }
                }
                
                pauseTimer();
                showWinPopup();
            }

            function setPlayState(playing) {
                const overlay = document.getElementById('grid-overlay');
                const overlayBtn = document.getElementById('btn-overlay-play');
                const pauseIcon = document.getElementById('pause-icon');
                const pauseText = document.getElementById('pause-text');
                
                if (playing) {
                    gameStarted = true;
                    document.body.classList.remove('game-paused');
                    overlay.classList.add('opacity-0', 'pointer-events-none');
                    pauseIcon.innerText = "⏸";
                    pauseText.innerText = "Tạm Dừng";
                    resumeTimer();
                } else {
                    document.body.classList.add('game-paused');
                    overlay.classList.remove('opacity-0', 'pointer-events-none');
                    if (gameStarted) {
                        overlayBtn.innerText = "▶️ Tiếp Tục Chơi";
                        pauseIcon.innerText = "▶️";
                        pauseText.innerText = "Tiếp Tục";
                    } else {
                        overlayBtn.innerText = "▶️ Bắt Đầu Chơi";
                        pauseIcon.innerText = "▶️";
                        pauseText.innerText = "Bắt Đầu";
                    }
                    pauseTimer();
                }
            }

            function startTimer() {
                clearInterval(timerInterval);
                timerStartTime = Date.now();
                isPaused = false;
                timerInterval = setInterval(updateTimer, 200);
            }

            function pauseTimer() {
                if (!isPaused) {
                    accumulatedTime += Date.now() - timerStartTime;
                    isPaused = true;
                    clearInterval(timerInterval);
                }
            }

            function resumeTimer() {
                if (isPaused) {
                    timerStartTime = Date.now();
                    isPaused = false;
                    timerInterval = setInterval(updateTimer, 200);
                }
            }

            function resetTimer() {
                clearInterval(timerInterval);
                accumulatedTime = 0;
                isPaused = true;
                document.getElementById('timer').innerText = "00:00";
            }

            function updateTimer() {
                let totalMs = accumulatedTime;
                if (!isPaused) {
                    totalMs += Date.now() - timerStartTime;
                }
                let totalSecs = Math.floor(totalMs / 1000);
                let m = Math.floor(totalSecs / 60).toString().padStart(2, '0');
                let s = (totalSecs % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${m}:${s}`;
            }

            function showWinPopup() {
                document.getElementById('stat-size').innerText = `${gridSize}x${gridSize}`;
                let diffSelect = document.getElementById('diff-select');
                document.getElementById('stat-diff').innerText = diffSelect.options[diffSelect.selectedIndex].text;
                document.getElementById('stat-time').innerText = document.getElementById('timer').innerText;
                
                let modal = document.getElementById('win-modal');
                let content = document.getElementById('win-content');
                
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                
                requestAnimationFrame(() => {
                    modal.classList.remove('opacity-0');
                    modal.classList.add('opacity-100');
                    content.classList.remove('scale-90');
                    content.classList.add('scale-100');
                });
                
                var end = Date.now() + (3 * 1000);
                var colors = ['#6366f1', '#ec4899', '#8b5cf6', '#38bdf8'];

                (function frame() {
                    confetti({
                        particleCount: 6,
                        angle: 60,
                        spread: 55,
                        origin: { x: 0 },
                        colors: colors
                    });
                    confetti({
                        particleCount: 6,
                        angle: 120,
                        spread: 55,
                        origin: { x: 1 },
                        colors: colors
                    });

                    if (Date.now() < end) {
                        requestAnimationFrame(frame);
                    }
                }());
            }

            document.getElementById('btn-new').onclick = initGame;
            
            document.getElementById('btn-clear-board').onclick = () => {
                document.querySelectorAll('.sudoku-cell:not(.fixed-cell)').forEach(el => {
                    el.value = '';
                });
                checkDuplicates();
                resetTimer();
                gameStarted = false;
                setPlayState(false);
            };

            document.getElementById('btn-overlay-play').onclick = () => {
                setPlayState(true);
            };

            document.getElementById('btn-pause-action').onclick = () => {
                if (!gameStarted || isPaused) {
                    setPlayState(true);
                } else {
                    setPlayState(false);
                }
            };

            document.getElementById('btn-play-again').onclick = () => {
                saveCurrentScore();
                
                let modal = document.getElementById('win-modal');
                let content = document.getElementById('win-content');
                
                modal.classList.remove('opacity-100');
                modal.classList.add('opacity-0');
                content.classList.remove('scale-100');
                content.classList.add('scale-90');
                
                setTimeout(() => {
                    modal.classList.remove('flex');
                    modal.classList.add('hidden');
                    initGame();
                }, 500);
            };

            // Quản lý cơ sở dữ liệu JSON LocalStorage & Bảng xếp hạng
            let currentFilterSize = 'all';

            document.getElementById('btn-export-scores').onclick = () => {
                let scores = localStorage.getItem('sudoku_scores') || '[]';
                let blob = new Blob([scores], {type: "application/json"});
                let url = URL.createObjectURL(blob);
                let a = document.createElement('a');
                a.href = url;
                a.download = "sudoku_scores_backup.json";
                a.click();
                URL.revokeObjectURL(url);
            };

            document.getElementById('btn-import-scores').onchange = (e) => {
                let file = e.target.files[0];
                if (!file) return;
                let reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        let data = JSON.parse(event.target.result);
                        if (Array.isArray(data)) {
                            let existing = JSON.parse(localStorage.getItem('sudoku_scores')) || [];
                            let merged = [...existing, ...data];
                            let unique = merged.filter((v,i,a)=>a.findIndex(t=>(t.name === v.name && t.timeStr === v.timeStr && t.date === v.date))===i);
                            localStorage.setItem('sudoku_scores', JSON.stringify(unique));
                            renderLeaderboard();
                            alert("Đã phục hồi dữ liệu thành công!");
                        }
                    } catch (err) {
                        alert("File không hợp lệ!");
                    }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            function parseTimeToSeconds(timeStr) {
                let parts = timeStr.split(':');
                if (parts.length === 2) {
                    return parseInt(parts[0]) * 60 + parseInt(parts[1]);
                }
                return 999999;
            }

            function saveCurrentScore() {
                let name = document.getElementById('player-name').value.trim() || 'Người chơi vô danh';
                let timeStr = document.getElementById('timer').innerText;
                let seconds = parseTimeToSeconds(timeStr);
                let diffSelect = document.getElementById('diff-select');
                let diffText = diffSelect.options[diffSelect.selectedIndex].text;
                let diffVal = diffSelect.value;

                let scoreRecord = {
                    name: name,
                    size: gridSize,
                    diffText: diffText,
                    diffValue: diffVal,
                    timeStr: timeStr,
                    seconds: seconds,
                    date: new Date().toLocaleDateString('vi-VN', {hour: '2-digit', minute:'2-digit'})
                };

                let scores = JSON.parse(localStorage.getItem('sudoku_scores')) || [];
                scores.push(scoreRecord);
                localStorage.setItem('sudoku_scores', JSON.stringify(scores));
            }

            function renderLeaderboard() {
                let scores = JSON.parse(localStorage.getItem('sudoku_scores')) || [];
                
                if (currentFilterSize !== 'all') {
                    let filterVal = parseInt(currentFilterSize);
                    scores = scores.filter(s => s.size === filterVal);
                }
                
                scores.sort((a, b) => {
                    if (a.size !== b.size) return a.size - b.size; // Sắp xếp theo lưới (3x3 -> 9x9)
                    
                    const diffWeights = { 'easy': 1, 'medium': 2, 'hard': 3, 'very_hard': 4 };
                    let wA = diffWeights[a.diffValue] || 0;
                    let wB = diffWeights[b.diffValue] || 0;
                    if (wA !== wB) return wA - wB; // Sắp xếp theo độ khó (Dễ -> Khó)
                    
                    return a.seconds - b.seconds; // Sắp xếp theo thời gian (nhanh nhất)
                });
                
                let tbody = document.getElementById('leaderboard-list');
                tbody.innerHTML = '';
                
                if (scores.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="py-4 text-center text-xs text-indigo-400 italic">Chưa có thành tích</td></tr>`;
                    return;
                }
                
                let currentGroupKey = '';
                let rankInGroup = 0;

                scores.forEach((s) => {
                    let groupKey = `${s.size}x${s.size} - ${s.diffText}`;
                    if (groupKey !== currentGroupKey) {
                        currentGroupKey = groupKey;
                        rankInGroup = 0; // Reset rank cho nhóm mới
                        let trHeader = document.createElement('tr');
                        trHeader.className = "bg-indigo-500/10 text-indigo-800 font-bold text-[10px] tracking-widest uppercase border-b border-indigo-200";
                        trHeader.innerHTML = `<td colspan="4" class="py-1 px-2 text-center">${groupKey}</td>`;
                        tbody.appendChild(trHeader);
                    }
                    
                    let tr = document.createElement('tr');
                    tr.className = "border-b border-indigo-100/50 hover:bg-white/30 text-xs transition-colors";
                    
                    let rankIcon = rankInGroup === 0 ? '🥇' : rankInGroup === 1 ? '🥈' : rankInGroup === 2 ? '🥉' : `${rankInGroup + 1}`;
                    let rankClass = rankInGroup < 3 ? 'text-sm font-bold' : '';
                    
                    tr.innerHTML = `
                        <td class="py-2 px-1 text-center ${rankClass}">${rankIcon}</td>
                        <td class="py-2 px-1 font-semibold truncate max-w-[120px]" title="${s.name}" colspan="2">${s.name}</td>
                        <td class="py-2 px-1 text-right font-mono text-pink-600 font-bold">${s.timeStr}</td>
                    `;
                    tbody.appendChild(tr);
                    rankInGroup++;
                });
            }

            const lbModal = document.getElementById('leaderboard-modal');
            const lbContent = document.getElementById('leaderboard-content');

            function openLeaderboard() {
                renderLeaderboard();
                lbModal.classList.remove('hidden');
                lbModal.classList.add('flex');
                
                requestAnimationFrame(() => {
                    lbModal.classList.remove('opacity-0');
                    lbModal.classList.add('opacity-100');
                    lbContent.classList.remove('scale-90');
                    lbContent.classList.add('scale-100');
                });
            }

            function closeLeaderboard() {
                lbModal.classList.remove('opacity-100');
                lbModal.classList.add('opacity-0');
                lbContent.classList.remove('scale-100');
                lbContent.classList.add('scale-90');
                
                setTimeout(() => {
                    lbModal.classList.remove('flex');
                    lbModal.classList.add('hidden');
                }, 300);
            }

            document.getElementById('btn-leaderboard').onclick = openLeaderboard;
            document.getElementById('btn-close-leaderboard').onclick = closeLeaderboard;

            lbModal.addEventListener('click', (e) => {
                if (e.target === lbModal) {
                    closeLeaderboard();
                }
            });

            document.querySelectorAll('#leaderboard-size-tabs .tab-btn').forEach(btn => {
                btn.onclick = (e) => {
                    document.querySelectorAll('#leaderboard-size-tabs .tab-btn').forEach(b => {
                        b.className = 'tab-btn px-2.5 py-0.5 bg-white/50 text-indigo-900 hover:bg-white rounded-lg text-xs font-semibold whitespace-nowrap';
                    });
                    e.target.className = 'tab-btn px-2.5 py-0.5 bg-indigo-600 text-white rounded-lg text-xs font-semibold whitespace-nowrap';
                    currentFilterSize = e.target.dataset.size;
                    renderLeaderboard();
                };
            });

            function initGame() {
                gridSize = parseInt(document.getElementById('size-select').value);
                let diff = document.getElementById('diff-select').value;
                
                let solution = generateSudoku(gridSize);
                currentPuzzle = createPuzzle(solution, diff);
                
                renderGrid();
                renderNumpad();
                
                resetTimer();
                gameStarted = false;
                setPlayState(false);
            }

            document.getElementById('size-select').addEventListener('change', initGame);
            document.getElementById('diff-select').addEventListener('change', initGame);

            initGame();
        });
    </script>
</body>
